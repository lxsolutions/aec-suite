
name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
        
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
        
    - name: Check formatting with black
      run: |
        black --check .
        
    - name: Check imports with isort
      run: |
        isort --check-only .
        
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: buildforge_test
          POSTGRES_USER: buildforge_test
          POSTGRES_PASSWORD: buildforge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
        
    - name: Run tests
      env:
        DATABASE_URL: postgresql://buildforge_test:buildforge_test@localhost:5432/buildforge_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest --cov=services --cov-report=xml --cov-report=html tests/
        
    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-reports
        path: |
          coverage.xml
          htmlcov/
          
  build-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
        
    - name: Install dependencies
      working-directory: apps/web
      run: npm ci
      
    - name: Build
      working-directory: apps/web
      run: npm run build
      
    - name: Run Lighthouse CI
      working-directory: apps/web
      run: |
        npm install -g @lhci/cli@0.12.x
        lhci autorun --upload.target=temporary-public-storage
        
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security scan
      uses: anchore/scan-action@v3
      with:
        path: "."
        
    - name: Run dependency check
      uses: actions/dependency-review-action@v3
        
  integration:
    runs-on: ubuntu-latest
    needs: [test, build-web, security]
    steps:
    - uses: actions/checkout@v4
    
    - name: Start services
      run: docker-compose -f infra/docker-compose.yml up -d
      
    - name: Wait for services
      run: sleep 30
      
    - name: Run integration tests
      run: |
        # TODO: Add integration test script
        echo "Integration tests to be implemented"
        
    - name: Stop services
      run: docker-compose -f infra/docker-compose.yml down
