
apiVersion: v2
name: erp-bridge
description: A Helm chart for AEC Suite ERP Bridge service
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "12.1.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "17.3.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: nats
    version: "1.0.0"
    repository: "https://nats-io.github.io/k8s/helm/charts"
    condition: nats.enabled
