



version: '3.8'

services:
  # Database services
  postgres:
    image: postgres:15-alpine
    container_name: rover-postgres
    environment:
      POSTGRES_USER: rover_user
      POSTGRES_PASSWORD: rover_password
      POSTGRES_DB: rover_operations
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  clickhouse:
    image: yandex/clickhouse-server:latest
    container_name: rover-clickhouse
    ports:
      - "8123:8123"   # HTTP interface for queries
      - "9000:9000"   # Native protocol port
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  minio:
    image: minio/minio:latest
    container_name: rover-minio
    environment:
      MINIO_ROOT_USER: rover_minio_admin
      MINIO_ROOT_PASSWORD: rover_minio_password
    ports:
      - "9001:9000"   # MinIO web interface and API
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  nats:
    image: nats:2-alpine
    container_name: rover-nats
    ports:
      - "4222:4222"   # NATS default port
    command: ["nats-server", "--jetstream"]

  # Core services
  control-broker:
    build:
      context: ./services/control-broker
      dockerfile: Dockerfile
    container_name: rover-control-broker
    ports:
      - "50051:50051"
    depends_on:
      - postgres
      - nats

  signaling-server:
    build:
      context: ./services/signaling
      dockerfile: Dockerfile
    container_name: rover-signaling
    ports:
      - "8443:8443"

  telemetry-service:
    build:
      context: ./services/telemetry
      dockerfile: Dockerfile
    container_name: rover-telemetry
    ports:
      - "8082:8082"
    depends_on:
      - clickhouse

  policy-engine:
    build:
      context: ./services/policy-engine
      dockerfile: Dockerfile
    container_name: rover-policy-engine
    ports:
      - "50052:50052"

  billing-service:
    build:
      context: ./services/billing
      dockerfile: Dockerfile
    container_name: rover-billing
    ports:
      - "50054:50054"
    depends_on:
      - postgres

  replay-service:
    build:
      context: ./services/replay
      dockerfile: Dockerfile
    container_name: rover-replay
    ports:
      - "50055:50055"

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: rover-api-gateway
    ports:
      - "8081:8081"
    depends_on:
      - control-broker
      - signaling-server

  # Edge components
  edge-agent:
    build:
      context: ./edge/agent
      dockerfile: Dockerfile
    container_name: rover-edge-agent
    ports:
      - "50053:50051"   # Exposed port mapped to agent's internal port

  hello-tractor-driver:
    build:
      context: ./edge/drivers/hello-tractor
      dockerfile: Dockerfile
    container_name: rover-hello-tractor
    ports:
      - "50056:50056"

  # Simulation services
  tractor-sim:
    build:
      context: ./sim/tractor-sim
      dockerfile: Dockerfile
    container_name: rover-tractor-sim
    ports:
      - "50057:50053"   # Exposed port mapped to sim's internal port

  # Web console
  web-console:
    build:
      context: ./web/console
      dockerfile: Dockerfile
    container_name: rover-web-console
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  minio_data:
    driver: local



