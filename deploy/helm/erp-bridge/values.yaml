
# Default values for erp-bridge
replicaCount: 2

image:
  repository: ghcr.io/lxsolutions/erp-bridge
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# ERP Bridge specific configuration
config:
  # ERP adapter configuration (Acumatica, Odoo, or mock)
  erpAdapter: "mock"  # Options: "acumatica", "odoo", "mock"
  
  # Acumatica configuration (if using acumatica adapter)
  acumatica:
    baseUrl: ""
    username: ""
    password: ""
    company: ""
    branch: ""
  
  # Odoo configuration (if using odoo adapter)  
  odoo:
    baseUrl: ""
    database: ""
    username: ""
    password: ""
  
  # NATS configuration
  nats:
    url: "nats://nats:4222"
  
  # Redis configuration
  redis:
    url: "redis://redis:6379"
  
  # Database configuration
  database:
    url: "postgresql://aec:aec123@postgresql:5432/aec_suite"
  
  # Logging and observability
  logging:
    level: "INFO"
  tracing:
    enabled: true
    jaegerEndpoint: "http://jaeger:14268/api/traces"

# External dependencies configuration
postgresql:
  enabled: true
  auth:
    username: "aec"
    password: "aec123"
    database: "aec_suite"

redis:
  enabled: true
  auth:
    enabled: false

nats:
  enabled: true

