

version: '3.8'

services:
  aec-suite:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=development
      - PYTHONPATH=/workspace
    command: sleep infinity

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aec
      POSTGRES_PASSWORD: aec123
      POSTGRES_DB: aec_suite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aec -d aec_suite"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -js
    healthcheck:
      test: ["CMD", "nats", "server", "check", "--healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: aec-suite-postgres-data
  redis_data:
    name: aec-suite-redis-data
  nats_jetstream:
    name: aec-suite-nats-jetstream

