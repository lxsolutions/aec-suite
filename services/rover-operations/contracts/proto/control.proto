




syntax = "proto3";

package rover.control;

// Control commands sent from operator to device
message Command {
    oneof command_type {
        CommandDrive drive_command = 1;
        CommandSensor sensor_command = 2;
        CommandSafety safety_command = 3;
        CommandPTO pto_command = 4; // Power Take-Off (placeholder)
    }

    string session_id = 5; // Session identifier for authorization
}

// Drive commands for vehicle movement
message CommandDrive {
    double speed = 1; // Normalized speed (-1.0 to 1.0)
    double steer_angle = 2; // Steering angle in degrees (-90 to 90)
    bool emergency_stop = 3; // Immediate stop override
}

// Sensor commands (for calibration or control)
message CommandSensor {
    string sensor_id = 1;
    oneof sensor_data {
        double value = 2;
        bytes binary_data = 3;
    }
}

// Safety-related commands
message CommandSafety {
    bool e_stop_activate = 1; // Emergency stop activation
    bool geofence_clearance_requested = 2; // Request to clear geofence violation
}

// Power Take-Off (PTO) commands (placeholder for future implementation)
message CommandPTO {
    string pto_id = 1;
    bool activate = 2;
    double speed_rpm = 3; // Rotations per minute
}

// Response from device after command execution
message CommandResponse {
    string command_id = 1; // ID of the original command
    bool success = 2;
    string error_message = 3;

    oneof response_data {
        DriveStatus drive_status = 4;
        SensorStatus sensor_status = 5;
        SafetyStatus safety_status = 6;
        PTOStatus pto_status = 7;
    }
}

// Status messages from device to control plane
message DeviceStatusUpdate {
    string session_id = 1;

    oneof status_type {
        DriveStatus drive_status = 2;
        SensorStatus sensor_status = 3;
        SafetyStatus safety_status = 4;
        PTOStatus pto_status = 5;
    }

    google.protobuf.Timestamp timestamp = 6; // When the status was recorded
}

// Vehicle drive status
message DriveStatus {
    double current_speed = 1; // Current speed (m/s)
    double steer_angle = 2; // Current steering angle (degrees)
    bool is_moving = 3;
    bool emergency_stop_active = 4;

    // GPS position
    double latitude = 5;
    double longitude = 6;
    float altitude = 7; // in meters

    // Heading information
    float heading_degrees = 8; // Degrees from north (0-360)
}

// Sensor status messages
message SensorStatus {
    string sensor_id = 1;
    oneof sensor_data {
        double value = 2;
        bytes binary_data = 3;
    }

    google.protobuf.Timestamp timestamp = 4;
}

// Safety-related status updates
message SafetyStatus {
    bool e_stop_active = 1; // Emergency stop currently active
    bool geofence_violation = 2; // Currently in violation of geofence
    string last_safety_event = 3; // Description of most recent safety event

    google.protobuf.Timestamp timestamp = 4;
}

// Power Take-Off (PTO) status
message PTOStatus {
    string pto_id = 1;
    bool is_active = 2;
    double current_rpm = 3; // Current rotations per minute
}

