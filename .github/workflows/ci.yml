




















name: CI Pipeline

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (web)
      working-directory: ./web/console
      run: npm ci

    - name: Run ESLint
      working-directory: ./web/console
      run: npx eslint . --ext .js,.ts,.tsx

  build:
    name: Build Services
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        service: [control-broker, signaling, telemetry, policy-engine, billing, replay, api-gateway]
        include:
          - service: control-broker
            working-directory: ./services/control-broker
          - service: signaling
            working-directory: ./services/signaling
          - service: telemetry
            working-directory: ./services/telemetry
          - service: policy-engine
            working-directory: ./services/policy-engine
          - service: billing
            working-directory: ./services/billing
          - service: replay
            working-directory: ./services/replay
          - service: api-gateway
            working-directory: ./services/api-gateway

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build service
      working-directory: ${{ matrix.working-directory }}
      run: go build -o ./bin/${{ matrix.service }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        component: [web-console, edge-agent, python-sdk]
        include:
          - component: web-console
            working-directory: ./web/console
            test-command: npm run test
          - component: edge-agent
            working-directory: ./edge/agent
            test-command: go test ./...
          - component: python-sdk
            working-directory: ./sdk/python
            test-command: pytest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js (for web console)
      if: matrix.component == 'web-console'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (web console)
      if: matrix.component == 'web-console'
      working-directory: ${{ matrix.working-directory }}
      run: npm ci

    - name: Set up Go (for edge agent)
      if: matrix.component == 'edge-agent'
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Python (for SDK)
      if: matrix.component == 'python-sdk'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies (Python SDK)
      if: matrix.component == 'python-sdk'
      working-directory: ${{ matrix.working-directory }}
      run: pip install -r requirements-dev.txt

    - name: Run tests
      working-directory: ${{ matrix.working-directory }}
      run: ${{ matrix.test-command }}

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push control-broker image
      working-directory: ./services/control-broker
      run: |
        docker build -t roveroperations/control-broker:latest .
        docker push roveroperations/control-broker:latest

    # Add similar steps for other services...






















