
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "erp-bridge.fullname" . }}
  labels:
    {{- include "erp-bridge.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "erp-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "erp-bridge.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "erp-bridge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: ERP_ADAPTER
              value: {{ .Values.config.erpAdapter | quote }}
            - name: NATS_URL
              value: {{ .Values.config.nats.url | quote }}
            - name: REDIS_URL
              value: {{ .Values.config.redis.url | quote }}
            - name: DATABASE_URL
              value: {{ .Values.config.database.url | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logging.level | quote }}
            - name: TRACING_ENABLED
              value: {{ .Values.config.tracing.enabled | quote }}
            - name: JAEGER_ENDPOINT
              value: {{ .Values.config.tracing.jaegerEndpoint | quote }}
            {{- if eq .Values.config.erpAdapter "acumatica" }}
            - name: ACUMATICA_BASE_URL
              value: {{ .Values.config.acumatica.baseUrl | quote }}
            - name: ACUMATICA_USERNAME
              value: {{ .Values.config.acumatica.username | quote }}
            - name: ACUMATICA_PASSWORD
              value: {{ .Values.config.acumatica.password | quote }}
            - name: ACUMATICA_COMPANY
              value: {{ .Values.config.acumatica.company | quote }}
            - name: ACUMATICA_BRANCH
              value: {{ .Values.config.acumatica.branch | quote }}
            {{- else if eq .Values.config.erpAdapter "odoo" }}
            - name: ODOO_BASE_URL
              value: {{ .Values.config.odoo.baseUrl | quote }}
            - name: ODOO_DATABASE
              value: {{ .Values.config.odoo.database | quote }}
            - name: ODOO_USERNAME
              value: {{ .Values.config.odoo.username | quote }}
            - name: ODOO_PASSWORD
              value: {{ .Values.config.odoo.password | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
