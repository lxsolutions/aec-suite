












syntax = "proto3";

package policy;

option go_package = "github.com/YOUR_USERNAME/rover-operations/contracts/proto/policy";

// Policy types
enum PolicyType {
  UNKNOWN = 0;
  SPEED_LIMIT = 1;          // Maximum speed for a device or role
  GEOFENCE = 2;              // Geographical boundary restrictions
  ACCESS_CONTROL = 3;       // Role-based access permissions
  TIME_WINDOW = 4;           // Time-of-day restrictions
}

message Policy {
  string id = 1;
  PolicyType type = 2;

  oneof policy_data {
    SpeedLimitPolicy speed_limit = 3;
    GeofencePolicy geofence = 4;
    AccessControlPolicy access_control = 5;
    TimeWindowPolicy time_window = 6;
  }

  string description = 7;   // Human-readable description
}

message SpeedLimitPolicy {
  float max_speed_mps = 1;     // Maximum speed in meters per second

  oneof scope {
    string device_id = 2;      // Specific device
    string role_name = 3;       // Role (e.g., "operator", "trainer")
  }
}

message GeoPoint {
  double latitude = 1;
  double longitude = 2;
}

// Geofence defined as a polygon with multiple vertices
message GeofencePolicy {
  string name = 1;

  repeated GeoPoint vertices = 2;   // Ordered list of points forming the boundary

  bool is_restricted_area = 3;      // True if entry is prohibited, false for required stay
}

message AccessControlPolicy {
  string role_name = 1;
  repeated string allowed_device_types = 2;
  repeated string allowed_commands = 3;

  bool requires_two_factor_auth = 4;
}

message TimeWindowPolicy {
  oneof scope {
    string device_id = 1;      // Specific device
    string role_name = 2;       // Role (e.g., "operator", "trainer")
  }

  repeated TimeRange allowed_times = 3;
}

message TimeRange {
  int64 start_time_seconds = 1;   // Unix timestamp for start time
  int64 end_time_seconds = 2;     // Unix timestamp for end time

  bool is_recurring = 3;

  oneof recurrence_pattern {
    string cron_expression = 4;
    RepeatingPattern repeating = 5;
  }
}

message RepeatingPattern {
  enum DayOfWeek { MONDAY = 0; TUESDAY = 1; WEDNESDAY = 2; THURSDAY = 3; FRIDAY = 4; SATURDAY = 5; SUNDAY = 6; }

  repeated DayOfWeek days_of_week = 1;
}

// Policy engine service
service PolicyEngine {
  rpc GetPolicy(string policy_id) returns (Policy);
  rpc ListPolicies(empty.Empty) returns (PolicyList);

  rpc ValidateCommand(CommandValidationRequest) returns (CommandValidationResponse);
}

message PolicyList {
  repeated Policy policies = 1;
}

// Command validation requests
message CommandValidationRequest {
  string device_id = 1;          // Target device ID
  string operator_role = 2;      // Role of the operator issuing command

  oneof command_data {
    DriveCommand drive_command = 3;
    SafetyCommand safety_command = 4;
  }

  GeoPoint proposed_position = 5;   // For commands that affect position (e.g., move)
}

message CommandValidationResponse {
  bool is_valid = 1;

  repeated string violations = 2;     // List of policy violations

  oneof response_data {
    empty.Empty success = 3;
    ValidationError error = 4;
  }
}

message DriveCommand {
  float speed = 1;          // m/s
  float steer_angle = 2;   // degrees (-90 to +90)
}

message SafetyCommand {
  bool e_stop_activate = 1;
  bool e_stop_release = 2;

  string reason = 3;       // Optional: description of why E-stop was activated
}

message ValidationError {
  string error_code = 1;
  string description = 2;
}

// Helper message types (imported from common.proto)
import "google/protobuf/empty.proto";












