

version: '3.8'

services:
  aec-suite:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=development
      - PYTHONPATH=/workspace
    command: sleep infinity

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aec
      POSTGRES_PASSWORD: aec123
      POSTGRES_DB: aec_suite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"

  jaeger:
    image: jaegertracing/all-in-one:1.48
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP collector
      - "6831:6831"    # UDP collector
      - "6832:6832"    # UDP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
  redis_data:

